name: Deploy static site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Show tool versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build static site
        run: npm run build

      - name: Ensure Pages entrypoint
        run: |
          if [ ! -f dist/index.html ]; then
            html_file="$(find dist -maxdepth 1 -type f -name '*.html' | head -n 1)"
            if [ -z "$html_file" ]; then
              echo "No HTML file found in dist" >&2
              exit 1
            fi
            cp "$html_file" dist/index.html
          fi

      - name: Verify Pages artifact
        run: |
          echo "Files prepared for GitHub Pages:"
          find dist -maxdepth 2 -type f -print -exec wc -c {} \;
          echo
          echo "First 80 lines of dist/index.html:"
          sed -n '1,80p' dist/index.html
          echo
          if grep -R "/src/main.tsx" dist; then
            echo "The Pages artifact still contains the source Vite entrypoint instead of bundled output." >&2
            exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
